# Patch 5 - preset per creare un video dimostrativo da pubblicare online.
# È pensato per qualità visiva, non per velocità live. Usa --save-output --no-display.

model:
  enabled: true
  path: "models/yolov8n.pt"
  confidence: 0.56
  iou: 0.50
  device: "cpu"      # cambia in "0" solo se torch.cuda.is_available() è True
  half: false
  imgsz: 384
  max_det: 10
  tracker: "bytetrack.yaml"
  enable_tracking: false
  async_inference: false
  target_classes:
    - bicycle
    - car
    - motorcycle
    - bus
    - truck

video:
  source: 0
  width: null
  height: null
  display: false
  save_output: true
  output_path: "outputs/adas_demo_export.mp4"
  log_every_n_frames: 120
  target_display_fps: 60
  display_width: null
  opencv_threads: 1
  inference_width: 640
  inference_every_n_frames: 3
  lane_every_n_frames: 1

lane:
  mode: "poly"
  processing_width: 720
  roi_top_ratio: 0.45
  roi_bottom_width_ratio: 0.98
  roi_top_width_ratio: 0.46
  vehicle_center_ratio: 0.50
  departure_offset_ratio: 0.10
  line_invasion_margin_ratio: 0.075
  ego_path_width_ratio: 0.52
  expected_lane_width_ratio: 0.55
  lane_width_tolerance_ratio: 0.46
  fallback_infer_missing_line: true
  smoothing_frames: 11
  curve_points: 56
  y_eval_ratio: 0.86
  white_v_min: 145
  white_s_max: 115
  yellow_h_low: 15
  yellow_h_high: 42
  yellow_s_min: 40
  yellow_v_min: 75
  sobel_threshold: 42
  morph_kernel: 5
  sliding_windows: 9
  window_margin: 80
  minpix: 32
  min_lane_pixels: 180
  histogram_y_min_ratio: 0.54
  histogram_y_max_ratio: 0.94
  dead_zone_ratio: 0.06

risk:
  warning_ttc_seconds: 1.8
  brake_ttc_seconds: 0.8
  min_area_growth_rate: 24.0
  stale_track_seconds: 1.2
  ego_lane_margin_ratio: 0.01
  fallback_center_path_ratio: 0.16
  require_lane_for_brake: true
  require_lane_for_warning: false
  use_ego_corridor: true
  min_bottom_y_ratio: 0.47
  min_area_ratio: 0.0018
  risk_classes:
    - bicycle
    - car
    - motorcycle
    - bus
    - truck

control:
  simulate_brake_only: true
  emergency_stop_latch_seconds: 0.45

debug:
  show_filtered: false

dashboard:
  enabled: true
  compact: false
  show_fps: false     # per video pubblicabile non mostriamo il benchmark live
  show_debug_text: false
  panel_alpha: 0.58
  road_alpha: 0.18
  ego_alpha: 0.23
  glow: true
  vignette: true
  micro_grid: false
  speed_kmh: null
  speed_limit_kmh: null
