# Patch 5 - preset CPU stabile.
# Usalo quando torch mostra +cpu o torch.cuda.is_available() = False.
# Obiettivo: finestra fluida; YOLO in background molto leggero.

model:
  enabled: true
  path: "models/yolov8n.pt"
  confidence: 0.60
  iou: 0.50
  device: "cpu"
  half: false
  imgsz: 224
  max_det: 6
  tracker: "bytetrack.yaml"
  enable_tracking: false
  async_inference: true
  target_classes:
    - bicycle
    - car
    - motorcycle
    - bus
    - truck

video:
  source: 0
  width: null
  height: null
  display: true
  save_output: false
  output_path: "outputs/adas_output.mp4"
  log_every_n_frames: 90
  target_display_fps: 60
  display_width: 1280
  opencv_threads: 1

  # CPU: YOLO piccolo e raro. La UI usa l'ultima detection disponibile.
  inference_width: 320
  inference_every_n_frames: 14

  # Lane ogni 3 frame: più fluida sul video, meno reattiva ma stabile.
  lane_every_n_frames: 3

lane:
  mode: "poly"
  processing_width: 480
  roi_top_ratio: 0.46
  roi_bottom_width_ratio: 0.98
  roi_top_width_ratio: 0.46
  vehicle_center_ratio: 0.50
  departure_offset_ratio: 0.10
  line_invasion_margin_ratio: 0.075
  ego_path_width_ratio: 0.52
  expected_lane_width_ratio: 0.55
  lane_width_tolerance_ratio: 0.46
  fallback_infer_missing_line: true
  smoothing_frames: 9
  curve_points: 34
  y_eval_ratio: 0.86
  white_v_min: 145
  white_s_max: 115
  yellow_h_low: 15
  yellow_h_high: 42
  yellow_s_min: 40
  yellow_v_min: 75
  sobel_threshold: 46
  morph_kernel: 5
  sliding_windows: 7
  window_margin: 64
  minpix: 30
  min_lane_pixels: 160
  histogram_y_min_ratio: 0.54
  histogram_y_max_ratio: 0.94
  dead_zone_ratio: 0.06

risk:
  warning_ttc_seconds: 1.8
  brake_ttc_seconds: 0.8
  min_area_growth_rate: 24.0
  stale_track_seconds: 1.2
  ego_lane_margin_ratio: 0.01
  fallback_center_path_ratio: 0.16
  require_lane_for_brake: true
  require_lane_for_warning: false
  use_ego_corridor: true
  min_bottom_y_ratio: 0.47
  min_area_ratio: 0.0018
  risk_classes:
    - bicycle
    - car
    - motorcycle
    - bus
    - truck

control:
  simulate_brake_only: true
  emergency_stop_latch_seconds: 0.45

debug:
  show_filtered: false

dashboard:
  enabled: true
  compact: true
  show_fps: true
  show_debug_text: false
  panel_alpha: 0.52
  road_alpha: 0.15
  ego_alpha: 0.20
  glow: false
  vignette: false
  micro_grid: false
  speed_kmh: null
  speed_limit_kmh: null
