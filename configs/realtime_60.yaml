# Patch 4 - preset per video fluido.
# Obiettivo: UI a 60 FPS percepiti, accettando che YOLO venga aggiornato ogni N frame.

model:
  enabled: true
  path: "models/yolov8n.pt"
  confidence: 0.58
  iou: 0.5
  device: null       # usa "0" se hai NVIDIA CUDA
  half: false        # true solo con CUDA
  imgsz: 256
  max_det: 8
  tracker: "bytetrack.yaml"
  enable_tracking: false
  async_inference: true
  target_classes:
    - bicycle
    - car
    - motorcycle
    - bus
    - truck

video:
  source: 0
  width: null
  height: null
  display: true
  save_output: false
  output_path: "outputs/adas_output.mp4"
  log_every_n_frames: 60
  target_display_fps: 60
  display_width: null

  # YOLO e' pesante: lo aggiorniamo poco, ma in background.
  inference_width: 416
  inference_every_n_frames: 8

  # Lane e' leggera: ogni 2 frame e' un buon compromesso.
  lane_every_n_frames: 2

lane:
  mode: "poly"
  processing_width: 640
  roi_top_ratio: 0.46
  roi_bottom_width_ratio: 0.98
  roi_top_width_ratio: 0.44
  vehicle_center_ratio: 0.50

  # Molto più sensibile della patch 3.
  departure_offset_ratio: 0.12
  line_invasion_margin_ratio: 0.060
  ego_path_width_ratio: 0.52

  expected_lane_width_ratio: 0.55
  lane_width_tolerance_ratio: 0.40
  fallback_infer_missing_line: true
  smoothing_frames: 7
  curve_points: 46
  y_eval_ratio: 0.86

  white_v_min: 150
  white_s_max: 105
  yellow_h_low: 15
  yellow_h_high: 40
  yellow_s_min: 45
  yellow_v_min: 80
  sobel_threshold: 42
  morph_kernel: 5

  sliding_windows: 9
  window_margin: 76
  minpix: 38
  min_lane_pixels: 220
  histogram_y_min_ratio: 0.55
  histogram_y_max_ratio: 0.94
  dead_zone_ratio: 0.06

risk:
  warning_ttc_seconds: 1.8
  brake_ttc_seconds: 0.8
  min_area_growth_rate: 24.0
  stale_track_seconds: 1.2
  ego_lane_margin_ratio: 0.01
  fallback_center_path_ratio: 0.16
  require_lane_for_brake: true
  require_lane_for_warning: false
  use_ego_corridor: true
  min_bottom_y_ratio: 0.47
  min_area_ratio: 0.0018
  risk_classes:
    - bicycle
    - car
    - motorcycle
    - bus
    - truck

control:
  simulate_brake_only: true
  emergency_stop_latch_seconds: 0.45

debug:
  show_filtered: false

dashboard:
  enabled: true
  compact: true
  show_fps: true
  show_debug_text: false
  panel_alpha: 0.58
  road_alpha: 0.18
  ego_alpha: 0.23
  glow: false
  vignette: false
  micro_grid: false
  speed_kmh: null
  speed_limit_kmh: null
